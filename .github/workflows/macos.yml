name: 'Tests: MacOS (tap suites)'

on: [pull_request, push]

permissions:
  contents: read

jobs:
  tests:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          show-progress: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Main test suite (tests-only)
        run: npm run tests-only

      - name: Compat test suite (tests-compat)
        run: npm run tests-compat
