name: 'Tests: node.js 25+ (non-blocking)'

# Newer majors (25, 26, …): run for signal; failures do not fail the workflow.
# Required coverage stays on node-tens / node-twenties (10.17–24).

on: [pull_request, push]

permissions:
  contents: read

jobs:
  tests:
    uses: ljharb/actions/.github/workflows/node.yml@main
    with:
      range: '>= 25'
      type: minors
      command: npm run tests-only
      continue-on-error: true
